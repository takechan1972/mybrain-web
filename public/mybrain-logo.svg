    <circle cx="62" cy="100" r="6"/>
    <circle cx="90" cy="86" r="6"/>
  </g>
  <!-- 右：行（テキストを表す横線） -->
  <g stroke="#1B2F5B" stroke-width="5" stroke-linecap="round">
    <line x1="150" y1="74" x2="178" y2="74"/>
